version: "3.9"

services:

  ollama:
    image: ollama/ollama
    container_name: ollama

    ports:
      - "11434:11434"

    volumes:
      - ollama_data:/root/.ollama

    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb

    ports:
      - "8000:8000"

    volumes:
      - ./chroma_data:/data

    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/data

    restart: unless-stopped

  n8n:
    image: n8nio/n8n
    container_name: n8n

    ports:
      - "5678:5678"

    volumes:
      - ./n8n:/home/node/.n8n

    environment:
      - N8N_SECURE_COOKIE=false
      - GENERIC_TIMEZONE=Europe/Amsterdam

    restart: unless-stopped

volumes:
  ollama_data: